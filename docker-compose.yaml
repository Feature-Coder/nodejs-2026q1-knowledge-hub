services:
  app:
    image: featurecoder/knowledge-hub:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-hub-api
    init: true
    ports:
      - '4000:4000'
    env_file:
      - .env
    restart: on-failure
    networks:
      - hub_network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:4000/ || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: knowledge-hub-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - hub_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: knowledge-hub-adminer
    profiles:
      - debug
    ports:
      - '8080:8080'
    networks:
      - hub_network
    depends_on:
      - db

volumes:
  pgdata:
    name: knowledge-hub-pgdata

networks:
  hub_network:
    name: knowledge-hub-network
    driver: bridge
